name: Deploy to EC2

# Despliega al hacer push a main. Si despliegas desde otra rama (p. ej. develop),
# cambia la lista de branches. workflow_dispatch permite lanzarlo manualmente.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/diegoporta20/finance-personal-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ---- Gate rapido: que compile y pasen los tests antes de construir la imagen ----
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm test --if-present

      # ---- Build + push de la imagen a GHCR ----
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Deploy: SSH al EC2, pull de la nueva imagen y up ----
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/finanzas
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d
            docker image prune -f
