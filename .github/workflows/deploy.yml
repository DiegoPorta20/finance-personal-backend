name: Deploy to EC2

# Despliega al hacer push. Ajusta la lista de branches segun tu flujo.
# workflow_dispatch permite lanzarlo manualmente desde la pestana Actions.
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  IMAGE: 896489643360.dkr.ecr.us-east-2.amazonaws.com/finance-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # ---- Gate rapido: que compile y pasen los tests antes de construir la imagen ----
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm test --if-present

      # ---- Login a AWS ECR (con access keys guardadas en secrets) ----
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Necesario para que `cache-to: type=gha` funcione (driver docker-container).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Build + push de la imagen a ECR ----
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Deploy: SSH al EC2, login a ECR (via rol IAM de la instancia), pull y up ----
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/finanzas
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin 896489643360.dkr.ecr.us-east-2.amazonaws.com
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d
            docker image prune -f
