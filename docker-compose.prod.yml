services:
  api:
    image: 896489643360.dkr.ecr.us-east-2.amazonaws.com/finance-backend:latest
    container_name: finanzas-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      # El host de la BD es el nombre del servicio en la red interna, NO localhost.
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3000"          # solo visible dentro de la red de docker, no al host/internet
    networks:
      - appnet

  mysql:
    image: mysql:8
    container_name: finanzas-mysql
    restart: unless-stopped
    env_file: .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    # IMPORTANTE: sin `ports:` -> MySQL NO se expone al host ni a internet.
    # Solo la API lo alcanza por la red interna `appnet`.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - appnet

  caddy:
    image: caddy:2
    container_name: finanzas-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - appnet

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  appnet:
    driver: bridge
